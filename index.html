<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamDrop | Instant P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #030303;
            color: #e2e8f0;
            overflow: hidden;
            user-select: none;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        @keyframes sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .radar-line {
            position: absolute;
            width: 100vh;
            height: 100vh;
            background: conic-gradient(from 0deg, rgba(34, 197, 94, 0.15) 0%, transparent 25%);
            border-radius: 50%;
            animation: sweep 8s linear infinite;
            pointer-events: none;
        }

        .glass {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .peer-node {
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        #image-preview-container img {
            max-width: 100%;
            max-height: 40vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(34, 197, 94, 0.1);
        }

        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
        }
    </style>
</head>
<body class="min-h-screen">

    <header class="fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center glass border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-green-500 rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(34,197,94,0.4)]">
                <svg class="w-5 h-5 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <h1 class="text-lg font-black tracking-tighter">BEAM<span class="text-green-500">DROP</span></h1>
        </div>
        <div class="text-right">
            <button id="change-name-btn" class="text-xs font-bold text-green-500 hover:text-green-400 block" id="display-name">---</button>
            <span class="text-[8px] mono text-white/20 tracking-widest uppercase" id="status-text">INITIALIZING...</span>
        </div>
    </header>

    <div id="transfer-overlay" class="fixed inset-0 z-[100] bg-black/95 hidden items-center justify-center p-6 backdrop-blur-xl">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-md border border-green-500/20 text-center relative overflow-hidden">
            <div id="image-preview-container" class="mb-6 hidden"></div>
            
            <h3 id="transfer-title" class="text-xl font-black mb-1">BEAM ACTIVE</h3>
            <p id="transfer-file-name" class="text-sm font-medium text-white/60 truncate mb-8 px-4">file_stream.data</p>
            
            <div id="progress-area">
                <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden mb-4">
                    <div id="transfer-progress" class="bg-green-500 h-full w-0 transition-all duration-200"></div>
                </div>
                <div class="flex justify-between mono text-[10px] text-green-500 font-bold">
                    <span id="transfer-percent">0%</span>
                    <span id="transfer-speed">SYNCING...</span>
                </div>
            </div>

            <div id="action-area" class="hidden flex flex-col gap-3 mt-4">
                <button id="download-btn" class="w-full py-5 bg-green-500 hover:bg-green-400 text-black font-black text-sm rounded-2xl transition btn-glow">SAVE TO DEVICE</button>
                <button id="close-transfer" class="w-full py-4 text-[10px] mono font-bold text-white/30 hover:text-white transition">DISMISS BEAM</button>
            </div>
        </div>
    </div>

    <main class="w-full h-screen relative flex items-center justify-center overflow-hidden">
        <div class="radar-line"></div>
        <div class="absolute inset-0 flex items-center justify-center opacity-10 pointer-events-none">
            <div class="w-[40vh] h-[40vh] border border-white rounded-full"></div>
            <div class="w-[70vh] h-[70vh] border border-white rounded-full absolute"></div>
        </div>

        <div id="peers-container" class="absolute inset-0 z-20 pointer-events-none"></div>
        
        <div class="relative z-10 text-center pointer-events-none">
            <div class="w-24 h-24 rounded-full border-2 border-green-500/20 flex items-center justify-center animate-pulse">
                <div class="w-3 h-3 bg-green-500 rounded-full shadow-[0_0_20px_#22c55e]"></div>
            </div>
        </div>
    </main>

    <div id="offer-modal" class="fixed inset-0 bg-black/90 hidden z-[110] flex items-center justify-center p-4 backdrop-blur-2xl">
        <div class="glass p-10 rounded-[3rem] border border-white/10 max-w-xs w-full text-center">
            <div class="w-16 h-16 bg-green-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <h2 class="text-lg font-bold mb-1">Incoming Beam</h2>
            <p id="offer-info" class="text-white/40 text-[10px] mono mb-8 uppercase tracking-widest"></p>
            <div class="flex gap-3">
                <button id="decline-btn" class="flex-1 py-4 text-[10px] mono font-bold bg-white/5 rounded-2xl hover:bg-white/10 transition">IGNORE</button>
                <button id="accept-btn" class="flex-1 py-4 bg-green-500 text-black font-black text-[10px] mono rounded-2xl hover:bg-green-400 transition">ACCEPT</button>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" class="hidden">

    <script>
        const SERVER_URL = "https://beamdrop-gidy.onrender.com/";
        const socket = io(SERVER_URL, { transports: ['websocket', 'polling'], upgrade: true });
        
        const peersContainer = document.getElementById('peers-container');
        const fileInput = document.getElementById('file-input');
        
        let myName = localStorage.getItem('bd_name') || `NODE-${Math.floor(Math.random() * 9999)}`;
        const myDevice = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) ? 'MOBILE' : 'STATION';
        
        let pc = null;
        let dc = null;
        let chunks = [];
        let meta = null;
        let activePeer = null;

        document.getElementById('change-name-btn').innerText = myName;

        socket.on('connect', () => {
            document.getElementById('status-text').innerText = "ONLINE";
            socket.emit('join-network', { name: myName, device: myDevice });
        });

        socket.on('peers-update', (peers) => {
            const list = peers.filter(p => p.id !== socket.id);
            renderPeers(list);
        });

        function renderPeers(peers) {
            peersContainer.innerHTML = '';
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const radius = Math.min(window.innerWidth, window.innerHeight) * 0.35;

            peers.forEach((peer, i) => {
                const angle = (i / peers.length) * Math.PI * 2 - Math.PI / 2;
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);

                const div = document.createElement('div');
                div.className = 'peer-node absolute pointer-events-auto cursor-pointer group flex flex-col items-center';
                div.style.left = `${x}px`;
                div.style.top = `${y}px`;
                div.style.transform = 'translate(-50%, -50%)';
                
                div.innerHTML = `
                    <div class="w-24 h-24 glass rounded-3xl flex items-center justify-center border border-white/5 group-hover:border-green-500/50 transition-all duration-300 shadow-xl group-active:scale-90">
                        <svg class="w-8 h-8 text-white/20 group-hover:text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            ${peer.device === 'MOBILE' ? '<path d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" stroke-width="1.5"/>' : '<path d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-width="1.5"/>'}
                        </svg>
                    </div>
                    <span class="mt-3 text-[10px] mono font-bold text-white/40 group-hover:text-white uppercase tracking-tighter">${peer.name}</span>
                `;
                div.onclick = () => { activePeer = peer.id; fileInput.click(); };
                peersContainer.appendChild(div);
            });
        }

        fileInput.onchange = () => {
            const file = fileInput.files[0];
            if (!file) return;
            meta = { name: file.name, size: file.size, type: file.type };
            socket.emit('file-offer', { to: activePeer, from: socket.id, metadata: meta });
            document.getElementById('status-text').innerText = "WAITING...";
        };

        socket.on('file-offer', ({ from, metadata }) => {
            activePeer = from;
            meta = metadata;
            document.getElementById('offer-modal').classList.remove('hidden');
            document.getElementById('offer-info').innerText = `${metadata.name} | ${(metadata.size/1024/1024).toFixed(1)}MB`;
            
            document.getElementById('accept-btn').onclick = () => {
                socket.emit('file-accept', { to: from, from: socket.id });
                document.getElementById('offer-modal').classList.add('hidden');
                setupWebRTC(from, false);
            };
            document.getElementById('decline-btn').onclick = () => {
                socket.emit('file-decline', { to: from, from: socket.id });
                document.getElementById('offer-modal').classList.add('hidden');
            };
        });

        socket.on('file-accept', ({ from }) => setupWebRTC(from, true));

        async function setupWebRTC(remoteId, isInitiator) {
            if (pc) pc.close();
            chunks = [];
            
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });

            pc.onicecandidate = (e) => {
                if (e.candidate) socket.emit('signal', { to: remoteId, signal: { candidate: e.candidate } });
            };

            if (isInitiator) {
                dc = pc.createDataChannel('beamChannel', { ordered: true });
                handleChannel(dc);
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                socket.emit('signal', { to: remoteId, signal: { sdp: offer } });
            } else {
                pc.ondatachannel = (e) => handleChannel(e.channel);
            }
        }

        socket.on('signal', async ({ signal }) => {
            if (!pc) return;
            if (signal.sdp) {
                await pc.setRemoteDescription(new RTCSessionDescription(signal.sdp));
                if (pc.remoteDescription.type === 'offer') {
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    socket.emit('signal', { to: activePeer, signal: { sdp: answer } });
                }
            } else if (signal.candidate) {
                pc.addIceCandidate(new RTCIceCandidate(signal.candidate)).catch(e => {});
            }
        });

        function handleChannel(channel) {
            dc = channel;
            dc.binaryType = 'arraybuffer';
            
            dc.onopen = () => {
                if (fileInput.files[0]) sendFile(fileInput.files[0]);
            };

            dc.onmessage = (e) => {
                chunks.push(e.data);
                const received = chunks.reduce((a, b) => a + b.byteLength, 0);
                updateUI(received, meta.size, "RECEIVING");
                if (received >= meta.size) finalizeBeam();
            };
        }

        async function sendFile(file) {
            updateUI(0, file.size, "SENDING");
            const reader = file.stream().getReader();
            let offset = 0;
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                while (dc.bufferedAmount > 1024 * 1024) await new Promise(r => setTimeout(r, 20));
                dc.send(value);
                offset += value.byteLength;
                updateUI(offset, file.size, "SENDING");
            }
            setTimeout(() => {
                document.getElementById('transfer-overlay').classList.add('hidden');
                document.getElementById('status-text').innerText = "ONLINE";
            }, 1000);
        }

        function updateUI(curr, total, label) {
            const overlay = document.getElementById('transfer-overlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            
            const p = Math.floor((curr / total) * 100);
            document.getElementById('transfer-title').innerText = label;
            document.getElementById('transfer-file-name').innerText = meta?.name || "STREAMING...";
            document.getElementById('transfer-progress').style.width = `${p}%`;
            document.getElementById('transfer-percent').innerText = `${p}%`;
            document.getElementById('transfer-speed').innerText = `${(curr/1024/1024).toFixed(1)}MB / ${(total/1024/1024).toFixed(1)}MB`;
        }

        function finalizeBeam() {
            const blob = new Blob(chunks, { type: meta.type || 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            
            document.getElementById('transfer-title').innerText = "BEAM RECEIVED";
            document.getElementById('progress-area').classList.add('hidden');
            document.getElementById('action-area').classList.remove('hidden');

            if (meta.type?.startsWith('image/')) {
                const container = document.getElementById('image-preview-container');
                container.innerHTML = `<img src="${url}" alt="beam">`;
                container.classList.remove('hidden');
            }

            // CRITICAL FIX: The download button logic
            const dBtn = document.getElementById('download-btn');
            dBtn.onclick = () => {
                const a = document.createElement('a');
                a.href = url;
                a.download = meta.name;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => document.body.removeChild(a), 100);
            };
        }

        document.getElementById('close-transfer').onclick = () => location.reload();
        document.getElementById('change-name-btn').onclick = () => {
            const n = prompt("NEW IDENT:", myName);
            if(n) { localStorage.setItem('bd_name', n.toUpperCase()); location.reload(); }
        };
    </script>
</body>
</html>
