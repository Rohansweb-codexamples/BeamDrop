<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamDrop | Secure P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #e2e8f0;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        @keyframes radar-sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(2.2); opacity: 0; }
        }

        @keyframes electrical-flow {
            0% { stroke-dashoffset: 100; opacity: 0.3; }
            50% { opacity: 1; }
            100% { stroke-dashoffset: 0; opacity: 0.3; }
        }

        .radar-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .radar-sweep {
            position: absolute;
            width: 80vh;
            height: 80vh;
            background: conic-gradient(from 0deg, rgba(34, 197, 94, 0.15) 0%, transparent 40%);
            border-radius: 50%;
            animation: radar-sweep 6s linear infinite;
            pointer-events: none;
        }

        .pulse {
            position: absolute;
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 50%;
            animation: pulse-ring 4s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }

        .lattice-structure {
            filter: drop-shadow(0 0 10px rgba(34, 197, 94, 0.4));
        }

        .lattice-line {
            stroke-dasharray: 20;
            animation: electrical-flow 3s linear infinite;
        }

        .peer-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .peer-card:hover {
            transform: translateY(-5px) scale(1.05);
            filter: drop-shadow(0 0 15px rgba(34, 197, 94, 0.3));
        }

        .glass {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="min-h-screen overflow-hidden">

    <!-- Header -->
    <header class="fixed top-0 w-full z-50 px-8 py-6 flex justify-between items-center glass border-b border-white/5">
        <div class="flex items-center gap-4">
            <div id="favicon-container" class="w-10 h-10 flex items-center justify-center"></div>
            <div>
                <h1 class="text-xl font-extrabold tracking-tighter leading-none">
                    BEAM<span class="text-green-500">DROP</span>
                </h1>
                <p class="text-[10px] mono text-white/40 uppercase tracking-[0.2em]">Secure Node Transfer</p>
            </div>
        </div>
        
        <div class="flex items-center gap-6">
            <div class="flex flex-col items-end">
                <button id="change-name-btn" class="text-xs font-semibold hover:text-green-400 transition flex items-center gap-2">
                    <span id="display-name" class="mono">Initializing...</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" stroke-width="2"/></svg>
                </button>
                <div class="flex items-center gap-1.5 mt-1">
                    <div id="status-dot" class="w-1.5 h-1.5 rounded-full bg-red-500 transition-colors duration-500"></div>
                    <span class="text-[9px] mono uppercase text-white/30 tracking-widest">Network Link</span>
                </div>
            </div>
        </div>
    </header>

    <!-- UI Overlay -->
    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 text-center">
        <p class="text-xs text-white/20 mono uppercase tracking-[0.3em]">Click an active node to initiate beam</p>
    </div>

    <!-- Main Canvas -->
    <main class="w-full h-screen radar-container">
        <!-- Visual Grid -->
        <div class="absolute inset-0 opacity-[0.03]" style="background-image: linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px); background-size: 100px 100px;"></div>
        
        <!-- Radar Circles -->
        <div class="pulse" style="width: 20vh; height: 20vh; animation-delay: 0s;"></div>
        <div class="pulse" style="width: 45vh; height: 45vh; animation-delay: 1.3s;"></div>
        <div class="pulse" style="width: 70vh; height: 70vh; animation-delay: 2.6s;"></div>
        
        <div class="radar-sweep"></div>

        <!-- Stylized Transmission Structure -->
        <div class="relative z-10 lattice-structure flex flex-col items-center">
            <svg width="120" height="240" viewBox="0 0 120 240" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Main Lattice -->
                <path d="M60 10L20 230H100L60 10Z" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.2"/>
                <path d="M20 230L60 120L100 230" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.2"/>
                <path d="M40 65H80" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.2"/>
                <path d="M30 130H90" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.2"/>
                
                <!-- Cross Beams -->
                <line x1="20" y1="200" x2="100" y2="200" stroke="#22c55e" stroke-width="1" stroke-opacity="0.1"/>
                
                <!-- Animated Flow Lines -->
                <path class="lattice-line" d="M60 10L20 230" stroke="#4ade80" stroke-width="1" stroke-opacity="0.8"/>
                <path class="lattice-line" d="M60 10L100 230" stroke="#4ade80" stroke-width="1" stroke-opacity="0.8" style="animation-delay: 1.5s;"/>
                
                <!-- Transmission Head -->
                <circle cx="60" cy="15" r="5" fill="#22c55e" class="animate-pulse"/>
                <circle cx="60" cy="15" r="10" stroke="#22c55e" stroke-opacity="0.4" class="animate-ping"/>
            </svg>
            <div class="mt-4 px-3 py-1 rounded bg-green-500/10 border border-green-500/20 text-[10px] mono text-green-400 font-bold tracking-widest animate-pulse">
                BROADCASTING
            </div>
        </div>

        <!-- Peers container -->
        <div id="peers-container" class="absolute inset-0 z-20 pointer-events-none"></div>
    </main>

    <!-- Transaction Modal -->
    <div id="offer-modal" class="fixed inset-0 bg-black/80 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="glass p-10 rounded-2xl border border-white/10 max-w-sm w-full text-center">
            <div class="w-16 h-16 bg-green-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-green-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10" />
                </svg>
            </div>
            <h2 class="text-xl font-bold mb-1">Incoming Transmission</h2>
            <p id="offer-text" class="text-white/40 text-sm mono mb-8">NODE_REQUEST_PENDING...</p>
            <div class="flex gap-3">
                <button id="decline-btn" class="flex-1 py-3 text-xs font-bold hover:bg-white/5 rounded-xl transition border border-white/5">REFUSE</button>
                <button id="accept-btn" class="flex-1 py-3 bg-green-600 hover:bg-green-500 text-black font-extrabold text-xs rounded-xl transition">RECEIVE</button>
            </div>
        </div>
    </div>

    <!-- Hidden Input -->
    <input type="file" id="file-input" class="hidden">

    <script>
        const SERVER_URL = "https://beamdrop-gidy.onrender.com/";
        const socket = io(SERVER_URL);
        
        const peersContainer = document.getElementById('peers-container');
        const displayName = document.getElementById('display-name');
        const fileInput = document.getElementById('file-input');
        const statusDot = document.getElementById('status-dot');
        
        let selectedPeerId = null;
        let myName = localStorage.getItem('beamdrop_name') || `NODE-${Math.floor(Math.random() * 999)}`;
        const myDevice = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) ? 'MOBILE' : 'STATION';

        displayName.innerText = myName;

        // --- Animated Favicon ---
        function updateFavicon() {
            const canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const time = Date.now() / 1000;
            const pulse = 0.5 + Math.abs(Math.sin(time * 2)) * 0.5;

            ctx.clearRect(0, 0, 32, 32);
            
            // Outer Ring
            ctx.beginPath();
            ctx.arc(16, 16, 14, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(34, 197, 94, ${0.2 * pulse})`;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Core
            const grad = ctx.createRadialGradient(16, 16, 1, 16, 16, 8);
            grad.addColorStop(0, '#4ade80');
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.globalAlpha = pulse;
            ctx.beginPath();
            ctx.arc(16, 16, 6, 0, Math.PI * 2);
            ctx.fill();

            const dataUrl = canvas.toDataURL("image/png");
            let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.rel = 'shortcut icon';
            link.href = dataUrl;
            document.head.appendChild(link);
            
            const logoUI = document.getElementById('favicon-container');
            logoUI.innerHTML = `<img src="${dataUrl}" class="w-8 h-8 opacity-80">`;
        }
        setInterval(updateFavicon, 100);

        // --- Socket Logic ---
        socket.on('connect', () => {
            statusDot.className = 'w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]';
            socket.emit('join-network', { name: myName, device: myDevice });
        });

        socket.on('connect_error', () => {
            statusDot.className = 'w-1.5 h-1.5 rounded-full bg-red-500';
        });

        socket.on('peers-update', (peers) => {
            renderPeers(peers.filter(p => p.id !== socket.id));
        });

        function renderPeers(peers) {
            peersContainer.innerHTML = '';
            if (peers.length === 0) return;

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const radius = Math.min(window.innerWidth, window.innerHeight) * 0.35;

            peers.forEach((peer, index) => {
                const angle = (index / peers.length) * Math.PI * 2 - Math.PI / 2;
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);

                const node = document.createElement('div');
                node.className = 'peer-card absolute pointer-events-auto cursor-pointer flex flex-col items-center group';
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.style.transform = 'translate(-50%, -50%)';
                
                node.innerHTML = `
                    <div class="relative w-24 h-24 glass rounded-3xl flex flex-col items-center justify-center border border-white/10 group-hover:border-green-500/50 transition-all">
                        <div class="mb-2">
                             ${peer.device === 'MOBILE' ? 
                                '<svg class="w-8 h-8 text-white/70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" stroke-width="1.5"/></svg>' : 
                                '<svg class="w-8 h-8 text-white/70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-width="1.5"/></svg>'
                            }
                        </div>
                        <span class="text-[10px] font-bold text-white/90 tracking-tighter uppercase px-2 text-center truncate w-full">${peer.name}</span>
                    </div>
                `;

                node.onclick = () => {
                    selectedPeerId = peer.id;
                    fileInput.click();
                };
                peersContainer.appendChild(node);
            });
        }

        // --- Interaction ---
        document.getElementById('change-name-btn').onclick = () => {
            const newName = prompt("Configure Node Identifier:", myName);
            if (newName && newName.trim()) {
                myName = newName.trim().substring(0, 12).toUpperCase();
                localStorage.setItem('beamdrop_name', myName);
                displayName.innerText = myName;
                socket.emit('join-network', { name: myName, device: myDevice });
            }
        };

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file || !selectedPeerId) return;
            socket.emit('file-offer', {
                to: selectedPeerId,
                from: socket.id,
                metadata: { name: file.name, size: (file.size / 1024 / 1024).toFixed(2) + 'MB' }
            });
            displayName.innerText = "BEAMING...";
            setTimeout(() => displayName.innerText = myName, 3000);
        };

        socket.on('file-offer', ({ from, metadata }) => {
            const modal = document.getElementById('offer-modal');
            modal.classList.remove('hidden');
            document.getElementById('offer-text').innerText = `${metadata.name} | ${metadata.size}`;
            
            document.getElementById('accept-btn').onclick = () => {
                socket.emit('file-accept', { to: from, from: socket.id });
                modal.classList.add('hidden');
            };
            document.getElementById('decline-btn').onclick = () => {
                socket.emit('file-decline', { to: from, from: socket.id });
                modal.classList.add('hidden');
            };
        });

        window.onresize = () => renderPeers([]); // Trigger refresh
    </script>
</body>
</html>
