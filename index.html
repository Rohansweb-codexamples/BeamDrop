<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamDrop 0.4| Secure P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #e2e8f0;
            overflow: hidden;
            user-select: none;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        @keyframes radar-sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(2.2); opacity: 0; }
        }

        @keyframes electrical-flow {
            0% { stroke-dashoffset: 100; opacity: 0.3; }
            50% { opacity: 1; }
            100% { stroke-dashoffset: 0; opacity: 0.3; }
        }

        .radar-sweep {
            position: absolute;
            width: 120vh;
            height: 120vh;
            background: conic-gradient(from 0deg, rgba(34, 197, 94, 0.08) 0%, transparent 30%);
            border-radius: 50%;
            animation: radar-sweep 10s linear infinite;
            pointer-events: none;
        }

        .pulse {
            position: absolute;
            border: 1px solid rgba(34, 197, 94, 0.15);
            border-radius: 50%;
            animation: pulse-ring 6s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }

        .lattice-line {
            stroke-dasharray: 20;
            animation: electrical-flow 2s linear infinite;
        }

        .peer-card {
            transition: left 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), top 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s, transform 0.5s;
            opacity: 0;
            transform: scale(0.8);
        }

        .peer-card.visible {
            opacity: 1;
            transform: scale(1);
        }

        .glass {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .progress-bar {
            transition: width 0.3s ease-out;
        }

        #image-preview-container img {
            max-width: 100%;
            max-height: 40vh;
            object-fit: contain;
            border-radius: 1rem;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.2);
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header -->
    <header class="fixed top-0 w-full z-50 px-8 py-6 flex justify-between items-center glass border-b border-white/5">
        <div class="flex items-center gap-4">
            <div id="favicon-container" class="w-10 h-10 flex items-center justify-center"></div>
            <div>
                <h1 class="text-xl font-extrabold tracking-tighter leading-none">
                    BEAM<span class="text-green-500">DROP</span>
                </h1>
                <p class="text-[9px] mono text-white/30 uppercase tracking-[0.3em]">Encrypted Node Link</p>
            </div>
        </div>
        
        <div class="flex items-center gap-6">
            <div class="flex flex-col items-end">
                <button id="change-name-btn" class="text-xs font-semibold hover:text-green-400 transition flex items-center gap-2">
                    <span id="display-name" class="mono text-green-500">SYNCING...</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" stroke-width="2"/></svg>
                </button>
                <div class="flex items-center gap-1.5 mt-1">
                    <div id="status-dot" class="w-1.5 h-1.5 rounded-full bg-red-500 transition-all duration-500"></div>
                    <span id="status-text" class="text-[9px] mono uppercase text-white/20 tracking-widest">Searching...</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Progress / Image Preview Overlay -->
    <div id="transfer-overlay" class="fixed inset-0 z-[60] bg-black/80 backdrop-blur-md hidden items-center justify-center p-6">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-lg border border-green-500/20 text-center shadow-2xl">
            <div id="image-preview-container" class="mb-6 hidden flex justify-center">
                <!-- Received image will appear here -->
            </div>
            
            <h3 id="transfer-title" class="text-lg font-bold mb-1">Processing Beam</h3>
            <p id="transfer-file-name" class="text-xs mono text-white/40 mb-6 truncate max-w-xs mx-auto">initializing_buffer...</p>
            
            <div id="progress-container" class="w-full">
                <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden mb-3">
                    <div id="transfer-progress" class="progress-bar bg-green-500 h-full w-0"></div>
                </div>
                <p id="transfer-percent" class="text-[10px] mono text-green-500 font-bold mb-4">0%</p>
            </div>

            <div id="action-container" class="hidden flex gap-4 mt-4">
                <button id="close-transfer" class="flex-1 py-4 text-[10px] mono font-bold bg-white/5 hover:bg-white/10 rounded-2xl transition tracking-widest">DISMISS</button>
                <button id="download-btn" class="flex-1 py-4 bg-green-600 hover:bg-green-500 text-black font-black text-[10px] mono rounded-2xl transition tracking-widest">SAVE FILE</button>
            </div>
        </div>
    </div>

    <!-- Main Canvas -->
    <main class="w-full h-screen relative flex items-center justify-center overflow-hidden">
        <!-- Background Elements -->
        <div class="absolute inset-0 opacity-[0.02] pointer-events-none" style="background-image: radial-gradient(#fff 1px, transparent 1px); background-size: 60px 60px;"></div>
        <div class="pulse" style="width: 40vh; height: 40vh; animation-delay: 0s;"></div>
        <div class="pulse" style="width: 80vh; height: 80vh; animation-delay: 2s;"></div>
        <div class="radar-sweep"></div>

        <!-- Center Lattice -->
        <div class="relative z-10 flex flex-col items-center pointer-events-none">
            <svg width="100" height="180" viewBox="0 0 120 240" fill="none">
                <path d="M60 10L20 230H100L60 10Z" stroke="#22c55e" stroke-width="1" stroke-opacity="0.1"/>
                <path class="lattice-line" d="M60 10L20 230" stroke="#4ade80" stroke-width="1.5" stroke-opacity="0.4"/>
                <path class="lattice-line" d="M60 10L100 230" stroke="#4ade80" stroke-width="1.5" stroke-opacity="0.4" style="animation-delay: 1s;"/>
                <circle cx="60" cy="15" r="5" fill="#22c55e" class="animate-pulse"/>
                <circle cx="60" cy="15" r="15" stroke="#22c55e" stroke-opacity="0.2" class="animate-ping"/>
            </svg>
            <div class="mt-4 px-4 py-1 rounded-full bg-green-500/5 border border-green-500/10 text-[9px] mono text-green-500 font-bold tracking-[0.4em]">
                ACTIVE
            </div>
        </div>

        <div id="peers-container" class="absolute inset-0 z-20 pointer-events-none"></div>
    </main>

    <!-- Receive Prompt -->
    <div id="offer-modal" class="fixed inset-0 bg-black/95 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-2xl">
        <div class="glass p-10 rounded-[3rem] border border-white/10 max-w-sm w-full text-center shadow-2xl">
            <div class="w-20 h-20 bg-green-500/10 rounded-3xl flex items-center justify-center mx-auto mb-8 border border-green-500/20 animate-bounce">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <h2 class="text-xl font-bold mb-2">Beam Detected</h2>
            <p id="offer-text" class="text-white/40 text-xs mono mb-10 leading-relaxed uppercase tracking-widest">Authorizing sequence...</p>
            <div class="flex gap-4">
                <button id="decline-btn" class="flex-1 py-4 text-[10px] mono font-bold hover:bg-white/5 rounded-2xl transition border border-white/10">IGNORE</button>
                <button id="accept-btn" class="flex-1 py-4 bg-green-600 hover:bg-green-500 text-black font-black text-[10px] mono rounded-2xl transition shadow-lg">RECEIVE</button>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" class="hidden">

    <script>
        const SERVER_URL = "https://beamdrop-gidy.onrender.com/";
        const socket = io(SERVER_URL);
        
        const peersContainer = document.getElementById('peers-container');
        const displayName = document.getElementById('display-name');
        const fileInput = document.getElementById('file-input');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        
        let selectedPeerId = null;
        let myName = localStorage.getItem('beamdrop_name') || `OPERATOR-${Math.floor(Math.random() * 999)}`;
        const myDevice = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) ? 'MOBILE' : 'STATION';

        // WebRTC State
        let pc = null;
        let dataChannel = null;
        let receivedChunks = [];
        let incomingMetadata = null;
        let currentBlobUrl = null;

        displayName.innerText = myName;

        function updateFavicon() {
            const canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const pulse = 0.5 + Math.abs(Math.sin(Date.now() / 500)) * 0.5;
            ctx.clearRect(0, 0, 32, 32);
            ctx.beginPath();
            ctx.arc(16, 16, 8, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(34, 197, 94, ${pulse})`;
            ctx.fill();
            const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.rel = 'icon';
            link.href = canvas.toDataURL();
            document.head.appendChild(link);
            document.getElementById('favicon-container').innerHTML = `<div class="w-3 h-3 bg-green-500 rounded-full" style="opacity: ${pulse}"></div>`;
        }
        setInterval(updateFavicon, 100);

        function renderPeers(peers) {
            const currentIds = peers.map(p => p.id);
            Array.from(peersContainer.children).forEach(node => {
                if (!currentIds.includes(node.dataset.id)) {
                    node.classList.remove('visible');
                    setTimeout(() => node.remove(), 600);
                }
            });

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const radius = Math.min(window.innerWidth, window.innerHeight) * 0.35;

            peers.forEach((peer, index) => {
                let node = Array.from(peersContainer.children).find(n => n.dataset.id === peer.id);
                const angle = (index / peers.length) * Math.PI * 2 - Math.PI / 2;
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);

                if (!node) {
                    node = document.createElement('div');
                    node.dataset.id = peer.id;
                    node.className = 'peer-card absolute pointer-events-auto cursor-pointer flex flex-col items-center group';
                    node.innerHTML = `
                        <div class="relative w-28 h-28 glass rounded-[2.5rem] flex flex-col items-center justify-center border border-white/5 hover:border-green-500/50 transition-all duration-500 shadow-xl">
                            <div class="mb-2 text-white/40 group-hover:text-green-500 transition-colors">
                                 ${peer.device === 'MOBILE' ? 
                                    '<svg class="w-9 h-9" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" stroke-width="1.5"/></svg>' : 
                                    '<svg class="w-9 h-9" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-width="1.5"/></svg>'
                                }
                            </div>
                            <span class="text-[10px] font-bold text-white/80 tracking-tighter uppercase px-4 truncate w-full text-center">${peer.name}</span>
                        </div>
                    `;
                    node.onclick = () => { selectedPeerId = peer.id; fileInput.click(); };
                    peersContainer.appendChild(node);
                    requestAnimationFrame(() => node.classList.add('visible'));
                }
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.style.transform = `translate(-50%, -50%)`;
            });
        }

        socket.on('connect', () => {
            statusDot.className = 'w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]';
            statusText.innerText = "LINK ESTABLISHED";
            socket.emit('join-network', { name: myName, device: myDevice });
        });

        socket.on('peers-update', renderPeers);

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file || !selectedPeerId) return;
            socket.emit('file-offer', {
                to: selectedPeerId,
                from: socket.id,
                metadata: { name: file.name, size: file.size, type: file.type }
            });
            displayName.innerText = "PREPARING...";
        };

        socket.on('file-offer', ({ from, metadata }) => {
            incomingMetadata = metadata;
            const modal = document.getElementById('offer-modal');
            modal.classList.remove('hidden');
            document.getElementById('offer-text').innerText = `${metadata.name}\n${(metadata.size/1024/1024).toFixed(2)} MB`;
            
            document.getElementById('accept-btn').onclick = () => {
                socket.emit('file-accept', { to: from, from: socket.id });
                modal.classList.add('hidden');
                setupWebRTC(from, false);
            };
            document.getElementById('decline-btn').onclick = () => {
                socket.emit('file-decline', { to: from, from: socket.id });
                modal.classList.add('hidden');
            };
        });

        socket.on('file-accept', ({ from }) => setupWebRTC(from, true));

        async function setupWebRTC(remoteId, isInitiator) {
            if(pc) pc.close();
            receivedChunks = [];
            
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });

            pc.onicecandidate = (e) => {
                if (e.candidate) socket.emit('signal', { to: remoteId, signal: { candidate: e.candidate } });
            };

            if (isInitiator) {
                dataChannel = pc.createDataChannel('beamChannel', { ordered: true });
                handleDataChannel(dataChannel);
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                socket.emit('signal', { to: remoteId, signal: { sdp: offer } });
            } else {
                pc.ondatachannel = (e) => handleDataChannel(e.channel);
            }
        }

        socket.on('signal', async ({ signal }) => {
            if (!pc) return;
            if (signal.sdp) {
                await pc.setRemoteDescription(new RTCSessionDescription(signal.sdp));
                if (pc.remoteDescription.type === 'offer') {
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    socket.emit('signal', { to: selectedPeerId, signal: { sdp: answer } });
                }
            } else if (signal.candidate) {
                await pc.addIceCandidate(new RTCIceCandidate(signal.candidate));
            }
        });

        function handleDataChannel(channel) {
            dataChannel = channel;
            channel.binaryType = 'arraybuffer';
            
            channel.onopen = () => {
                if (fileInput.files[0]) sendFile(fileInput.files[0]);
            };

            channel.onmessage = (e) => {
                receivedChunks.push(e.data);
                const receivedSize = receivedChunks.reduce((acc, c) => acc + c.byteLength, 0);
                updateProgressUI(receivedSize, incomingMetadata.size, "RECEIVING");
                if (receivedSize >= incomingMetadata.size) finalizeDownload();
            };
        }

        async function sendFile(file) {
            updateProgressUI(0, file.size, "BEAMING");
            const reader = file.stream().getReader();
            let offset = 0;
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                while (dataChannel.bufferedAmount > 1024 * 1024) await new Promise(r => setTimeout(r, 20));
                dataChannel.send(value);
                offset += value.byteLength;
                updateProgressUI(offset, file.size, "BEAMING");
            }
            setTimeout(resetUI, 2000);
        }

        function updateProgressUI(current, total, label) {
            const overlay = document.getElementById('transfer-overlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            
            const percent = Math.floor((current / total) * 100);
            document.getElementById('transfer-title').innerText = label;
            document.getElementById('transfer-file-name').innerText = incomingMetadata?.name || fileInput.files[0]?.name;
            document.getElementById('transfer-progress').style.width = `${percent}%`;
            document.getElementById('transfer-percent').innerText = `${percent}%`;
        }

        function finalizeDownload() {
            const blob = new Blob(receivedChunks, { type: incomingMetadata.type });
            currentBlobUrl = URL.createObjectURL(blob);
            
            document.getElementById('transfer-title').innerText = "BEAM COMPLETE";
            document.getElementById('progress-container').classList.add('hidden');
            document.getElementById('action-container').classList.remove('hidden');
            document.getElementById('action-container').classList.add('flex');

            if (incomingMetadata.type.startsWith('image/')) {
                const img = document.createElement('img');
                img.src = currentBlobUrl;
                const container = document.getElementById('image-preview-container');
                container.innerHTML = '';
                container.appendChild(img);
                container.classList.remove('hidden');
            }

            document.getElementById('download-btn').onclick = () => {
                const a = document.createElement('a');
                a.href = currentBlobUrl;
                a.download = incomingMetadata.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };
        }

        function resetUI() {
            document.getElementById('transfer-overlay').classList.replace('flex', 'hidden');
            document.getElementById('image-preview-container').classList.add('hidden');
            document.getElementById('progress-container').classList.remove('hidden');
            document.getElementById('action-container').classList.add('hidden');
            document.getElementById('transfer-progress').style.width = '0%';
            displayName.innerText = myName;
            fileInput.value = '';
            if(currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
        }

        document.getElementById('close-transfer').onclick = resetUI;
        document.getElementById('change-name-btn').onclick = () => {
            const n = prompt("NODE IDENT:", myName);
            if (n) { myName = n.toUpperCase(); localStorage.setItem('beamdrop_name', myName); location.reload(); }
        };
    </script>
</body>
</html>
